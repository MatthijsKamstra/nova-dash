<div class="nd-page-title">
	<i class="bi bi-cloud-sun-fill"></i> Local Weather
</div>

<div class="row g-3" style="max-width: 900px;">
	<div class="col-12">
		<div class="nd-card">
			<div class="d-flex align-items-center justify-content-between mb-3">
				<div>
					<div class="fw-semibold">Current Conditions</div>
					<div id="weather-location" class="small text-secondary">Locating...</div>
				</div>
				<button class="btn btn-sm btn-outline-secondary" id="weather-refresh-btn">
					<i class="bi bi-arrow-clockwise me-1"></i>Refresh
				</button>
			</div>
			<div id="weather-current" class="d-flex align-items-center gap-3">
				<div class="spinner-border spinner-border-sm" role="status"></div>
				<span class="text-secondary">Loading weather...</span>
			</div>
			<div id="weather-error" class="alert alert-warning mt-3 d-none mb-0"></div>
		</div>
	</div>

	<div class="col-12">
		<div class="nd-card">
			<div class="fw-semibold mb-3">3-Day Forecast</div>
			<div id="weather-forecast" class="row g-2">
				<div class="col-12 text-secondary small">Forecast will appear after location is resolved.</div>
			</div>
		</div>
	</div>
</div>

<script>
	(function () {
		function weatherLabel(code) {
			const map = {
				0: 'Clear sky',
				1: 'Mainly clear',
				2: 'Partly cloudy',
				3: 'Overcast',
				45: 'Fog',
				48: 'Rime fog',
				51: 'Light drizzle',
				53: 'Drizzle',
				55: 'Dense drizzle',
				61: 'Slight rain',
				63: 'Rain',
				65: 'Heavy rain',
				71: 'Slight snow',
				73: 'Snow',
				75: 'Heavy snow',
				80: 'Rain showers',
				81: 'Heavy rain showers',
				82: 'Violent rain showers',
				95: 'Thunderstorm'
			}
			return map[code] || 'Unknown'
		}

		function weatherIcon(code) {
			if (code === 0) return 'bi-brightness-high-fill text-warning'
			if (code <= 3) return 'bi-cloud-sun-fill text-info'
			if (code >= 45 && code <= 48) return 'bi-cloud-fog2-fill text-secondary'
			if ((code >= 51 && code <= 65) || (code >= 80 && code <= 82)) return 'bi-cloud-rain-fill text-primary'
			if (code >= 71 && code <= 75) return 'bi-cloud-snow-fill text-info'
			if (code >= 95) return 'bi-cloud-lightning-rain-fill text-warning'
			return 'bi-cloud-fill text-secondary'
		}

		function setError(message) {
			const errorEl = document.getElementById('weather-error')
			if (!errorEl) return
			errorEl.textContent = message
			errorEl.classList.remove('d-none')
		}

		function clearError() {
			const errorEl = document.getElementById('weather-error')
			if (!errorEl) return
			errorEl.classList.add('d-none')
			errorEl.textContent = ''
		}

		function renderCurrent(data) {
			const currentEl = document.getElementById('weather-current')
			if (!currentEl) return
			const current = data.current
			currentEl.innerHTML = `
				<i class="bi ${weatherIcon(current.weather_code)} fs-1"></i>
				<div>
					<div class="fw-semibold fs-4">${Math.round(current.temperature_2m)}°C</div>
					<div class="text-secondary">${weatherLabel(current.weather_code)}</div>
					<div class="small text-secondary">Wind ${Math.round(current.wind_speed_10m)} km/h</div>
				</div>
			`
		}

		function renderForecast(data) {
			const forecastEl = document.getElementById('weather-forecast')
			if (!forecastEl) return
			const days = data.daily.time
			forecastEl.innerHTML = ''

			for (let i = 0; i < Math.min(3, days.length); i++) {
				const date = new Date(days[i])
				const dayLabel = date.toLocaleDateString([], { weekday: 'short', day: '2-digit', month: 'short' })
				const code = data.daily.weather_code[i]
				const max = Math.round(data.daily.temperature_2m_max[i])
				const min = Math.round(data.daily.temperature_2m_min[i])

				forecastEl.innerHTML += `
					<div class="col-12 col-md-4">
						<div class="border rounded p-3 h-100">
							<div class="small text-secondary mb-1">${dayLabel}</div>
							<div class="d-flex align-items-center gap-2 mb-2">
								<i class="bi ${weatherIcon(code)}"></i>
								<span class="small">${weatherLabel(code)}</span>
							</div>
							<div class="fw-semibold">${max}° / ${min}°</div>
						</div>
					</div>
				`
			}
		}

		async function fetchWeather(lat, lon) {
			const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=3&timezone=auto`
			const response = await fetch(url)
			if (!response.ok) {
				throw new Error('Weather service unavailable')
			}
			return response.json()
		}

		async function loadWeather() {
			clearError()
			const locationEl = document.getElementById('weather-location')
			if (locationEl) {
				locationEl.textContent = 'Detecting your location...'
			}

			if (!navigator.geolocation) {
				setError('Geolocation is not supported on this device.')
				return
			}

			navigator.geolocation.getCurrentPosition(async (position) => {
				try {
					const lat = position.coords.latitude
					const lon = position.coords.longitude
					if (locationEl) {
						locationEl.textContent = `Latitude ${lat.toFixed(2)}, Longitude ${lon.toFixed(2)}`
					}
					const data = await fetchWeather(lat, lon)
					renderCurrent(data)
					renderForecast(data)
				} catch (err) {
					setError('Could not load weather data. Check your internet connection and try again.')
				}
			}, (error) => {
				if (error.code === 1) {
					setError('Location permission denied. Enable location access for local weather.')
				} else {
					setError('Could not determine your location.')
				}
			})
		}

		window.initPage_weather = async function () {
			const refreshBtn = document.getElementById('weather-refresh-btn')
			if (refreshBtn && !refreshBtn.dataset.bound) {
				refreshBtn.addEventListener('click', () => {
					loadWeather()
				})
				refreshBtn.dataset.bound = '1'
			}
			await loadWeather()
		}
	})()
</script>
