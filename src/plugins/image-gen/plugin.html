<!-- image-gen.html — Ollama Image Generator -->
<div class="container-fluid h-100" id="image-gen-root">

	<!-- Platform warning (shown on non-macOS) -->
	<div id="platform-warning" class="alert alert-warning d-none" role="alert">
		<i class="bi bi-exclamation-triangle me-2"></i>
		<strong>macOS Only:</strong> Image generation via Ollama is currently only supported on macOS.
	</div>

	<!-- Model Selector -->
	<div id="image-gen-model-selector"></div>

	<!-- Prompt Input -->
	<div class="mb-2">
		<label for="image-prompt" class="form-label fw-semibold">Prompt</label>
		<textarea class="form-control" id="image-prompt" rows="3"
			placeholder="Describe the image you want to generate..."></textarea>
	</div>

	<!-- Actions -->
	<div class="d-flex flex-wrap align-items-center gap-2 mb-3">
		<button class="btn btn-primary btn-sm" id="image-add-queue" disabled>
			<i class="bi bi-collection-play me-1"></i> Add to queue
		</button>
		<button class="btn btn-outline-secondary btn-sm" id="image-clear-iteration">
			<i class="bi bi-arrow-counterclockwise me-1"></i> Clear iteration
		</button>
		<div class="ms-auto d-flex align-items-center gap-2">
			<div class="form-check mb-0">
				<input class="form-check-input" type="checkbox" id="prompt-assist">
				<label class="form-check-label small" for="prompt-assist">Prompt assist</label>
			</div>
			<button class="btn btn-outline-secondary btn-sm" id="image-preview" disabled>Preview</button>
		</div>
	</div>

	<!-- Style & Model row -->
	<div class="row g-2 mb-2">
		<div class="col-6">
			<label for="image-style" class="form-label form-label-sm fw-semibold">Style</label>
			<select id="image-style" class="form-select form-select-sm">
				<option value="">No style</option>
				<option value="icon">Icon</option>
				<option value="minimal">Minimal (B/W icon)</option>
				<option value="vector">Vector (ink graphic novel)</option>
				<option value="photo">Photo (B/W high contrast)</option>
				<option value="anime">Anime style</option>
				<option value="cinematic">Cinematic lighting</option>
				<option value="cyberpunk">Cyberpunk</option>
				<option value="studio-shot">Studio shot</option>
			</select>
		</div>
		<div class="col-6">
			<!-- Model is handled by the selector above -->
		</div>
	</div>

	<!-- Size Preset -->
	<div class="mb-2">
		<label for="image-preset" class="form-label form-label-sm fw-semibold">Size preset</label>
		<select id="image-preset" class="form-select form-select-sm">
			<option value="">No preset</option>
			<option value="icon-16">Icon 16×16</option>
			<option value="icon-32">Icon 32×32</option>
			<option value="icon-64">Icon 64×64</option>
			<option value="icon-128">Icon 128×128</option>
			<option value="icon-256">Icon 256×256</option>
			<option value="icon-512">Icon 512×512</option>
			<option value="linkedin-post">LinkedIn Post (1200×627)</option>
			<option value="instagram-square">Instagram Square (1080×1080)</option>
			<option value="instagram-portrait">Instagram Portrait (1080×1350)</option>
			<option value="instagram-story">Instagram Story (1080×1920)</option>
			<option value="presentation-16-9">Presentation 16:9 (1920×1080)</option>
			<option value="print-210x105-150dpi">Print 210×105mm @ 150dpi (1240×620)</option>
			<option value="print-210x105-300dpi">Print 210×105mm @ 300dpi (2480×1240)</option>
			<option value="bookmark-150dpi">Bookmark 4×15cm @ 150dpi (236×886)</option>
			<option value="bookmark-300dpi">Bookmark 4×15cm @ 300dpi (472×1772)</option>
		</select>
	</div>

	<!-- Width & Height -->
	<div class="row g-2 mb-2">
		<div class="col-6">
			<label for="image-width" class="form-label form-label-sm fw-semibold">Width</label>
			<input type="number" class="form-control form-control-sm" id="image-width" value="512" min="16" max="4096"
				step="8">
		</div>
		<div class="col-6">
			<label for="image-height" class="form-label form-label-sm fw-semibold">Height</label>
			<input type="number" class="form-control form-control-sm" id="image-height" value="512" min="16" max="4096"
				step="8">
		</div>
	</div>

	<!-- Steps & Seed -->
	<div class="row g-2 mb-2">
		<div class="col-6">
			<label for="image-steps" class="form-label form-label-sm fw-semibold">Steps</label>
			<input type="number" class="form-control form-control-sm" id="image-steps" value="20" min="1" max="150">
		</div>
		<div class="col-6">
			<label for="image-seed" class="form-label form-label-sm fw-semibold">Seed</label>
			<input type="number" class="form-control form-control-sm" id="image-seed" placeholder="random" min="0">
		</div>
	</div>

	<!-- Negative Prompt -->
	<div class="mb-3">
		<label for="image-negative" class="form-label form-label-sm fw-semibold">Negative prompt</label>
		<input type="text" class="form-control form-control-sm" id="image-negative" placeholder="optional">
	</div>

	<!-- Iteration status -->
	<div id="image-iteration-status" class="text-muted small mb-3">Iteration: none</div>

	<!-- Progress -->
	<div id="image-progress" class="d-none mb-3">
		<div class="d-flex align-items-center">
			<div class="spinner-border spinner-border-sm text-primary me-2" role="status">
				<span class="visually-hidden">Generating...</span>
			</div>
			<span id="image-progress-text">Generating image...</span>
		</div>
	</div>

	<!-- Generated Image Display -->
	<div id="image-result" class="d-none">
		<h6 class="text-muted mb-2">Generated Image</h6>
		<div class="border rounded p-3 bg-body-secondary text-center">
			<img id="image-output" src="" alt="Generated image" class="img-fluid rounded" style="max-height: 500px;">
		</div>
		<div class="mt-2 d-flex align-items-center gap-2 flex-wrap">
			<span class="text-muted small"><i class="bi bi-folder me-1"></i><span id="image-saved-path"></span></span>
			<button class="btn btn-sm btn-outline-secondary ms-auto" id="image-copy">
				<i class="bi bi-clipboard"></i> Copy to Clipboard
			</button>
		</div>
	</div>

	<!-- Quick Prompts -->
	<div class="border-top pt-3 mt-3">
		<h6 class="text-muted mb-2"><i class="bi bi-lightning me-1"></i> Quick Prompts</h6>
		<div class="d-flex flex-wrap gap-2">
			<button class="btn btn-sm btn-outline-secondary quick-prompt"
				data-prompt="A futuristic cityscape at night with neon lights">🌃 Futuristic City</button>
			<button class="btn btn-sm btn-outline-secondary quick-prompt"
				data-prompt="A cozy coffee shop interior with warm lighting and books">☕ Cozy Cafe</button>
			<button class="btn btn-sm btn-outline-secondary quick-prompt"
				data-prompt="A majestic dragon flying over mountains">🐉 Dragon</button>
			<button class="btn btn-sm btn-outline-secondary quick-prompt"
				data-prompt="A serene Japanese garden with cherry blossoms">🌸 Zen Garden</button>
			<button class="btn btn-sm btn-outline-secondary quick-prompt"
				data-prompt="A spaceship cockpit view overlooking a distant planet">🚀 Space View</button>
		</div>
	</div>
</div>

<script>
	(function () {
		const platform = window.__platform || navigator.platform;
		const isMac = platform === 'darwin' || platform.toLowerCase().includes('mac');

		if (!isMac) {
			document.getElementById('platform-warning').classList.remove('d-none');
		}

		// Style suffix map
		const STYLE_SUFFIXES = {
			'icon': 'flat icon design, clean vector',
			'minimal': 'minimal black and white icon, simple',
			'vector': 'vector art, ink graphic novel style, bold lines',
			'photo': 'black and white photograph, high contrast',
			'anime': 'anime style, Japanese animation',
			'cinematic': 'cinematic lighting, dramatic atmosphere, film still',
			'cyberpunk': 'cyberpunk style, neon lights, dark city, futuristic',
			'studio-shot': 'professional studio shot, clean background, sharp focus'
		};

		// Preset size map: [width, height]
		const PRESET_SIZES = {
			'icon-16': [16, 16],
			'icon-32': [32, 32],
			'icon-64': [64, 64],
			'icon-128': [128, 128],
			'icon-256': [256, 256],
			'icon-512': [512, 512],
			'linkedin-post': [1200, 627],
			'instagram-square': [1080, 1080],
			'instagram-portrait': [1080, 1350],
			'instagram-story': [1080, 1920],
			'presentation-16-9': [1920, 1080],
			'print-210x105-150dpi': [1240, 620],
			'print-210x105-300dpi': [2480, 1240],
			'bookmark-150dpi': [236, 886],
			'bookmark-300dpi': [472, 1772]
		};

		let currentModel = null;
		let isGenerating = false;
		let queue = [];
		let iterationCount = 0;

		const promptInput = document.getElementById('image-prompt');
		const addQueueBtn = document.getElementById('image-add-queue');
		const clearIterBtn = document.getElementById('image-clear-iteration');
		const promptAssist = document.getElementById('prompt-assist');
		const previewBtn = document.getElementById('image-preview');
		const styleSelect = document.getElementById('image-style');
		const presetSelect = document.getElementById('image-preset');
		const widthInput = document.getElementById('image-width');
		const heightInput = document.getElementById('image-height');
		const stepsInput = document.getElementById('image-steps');
		const seedInput = document.getElementById('image-seed');
		const negativeInput = document.getElementById('image-negative');
		const iterationStatus = document.getElementById('image-iteration-status');
		const progressDiv = document.getElementById('image-progress');
		const progressText = document.getElementById('image-progress-text');
		const resultDiv = document.getElementById('image-result');
		const outputImg = document.getElementById('image-output');
		const savedPathSpan = document.getElementById('image-saved-path');
		const copyBtn = document.getElementById('image-copy');

		// Initialize model selector
		async function init() {
			await window.ModelSelector.createModelSelector({
				containerId: 'image-gen-model-selector',
				category: 'image',
				settingKey: 'image_gen_preferred_model',
				defaultModel: 'x/flux2-klein:4b',
				onChange: (model) => {
					currentModel = model;
					updateButtons();
				}
			});
		}

		function updateButtons() {
			const hasPrompt = promptInput.value.trim().length > 0;
			const canAct = !!currentModel && hasPrompt && !isGenerating && isMac;
			addQueueBtn.disabled = !canAct;
			previewBtn.disabled = !canAct;
		}

		function updateIterationStatus() {
			if (iterationCount === 0 && queue.length === 0) {
				iterationStatus.textContent = 'Iteration: none';
			} else {
				const pending = queue.length;
				iterationStatus.textContent =
					`Iteration: ${iterationCount}${pending > 0 ? ` (+${pending} queued)` : ''}`;
			}
		}

		function buildPrompt(base) {
			const style = styleSelect.value;
			return style ? `${base}, ${STYLE_SUFFIXES[style]}` : base;
		}

		function buildJob() {
			const seedVal = seedInput.value.trim();
			return {
				model: currentModel,
				prompt: buildPrompt(promptInput.value.trim()),
				width: parseInt(widthInput.value) || 512,
				height: parseInt(heightInput.value) || 512,
				steps: parseInt(stepsInput.value) || 20,
				seed: seedVal !== '' ? parseInt(seedVal) : undefined,
				negativePrompt: negativeInput.value.trim() || undefined
			};
		}

		async function processQueue() {
			if (isGenerating || queue.length === 0) return;

			isGenerating = true;
			updateButtons();
			const job = queue.shift();
			iterationCount++;
			updateIterationStatus();

			resultDiv.classList.add('d-none');
			progressDiv.classList.remove('d-none');
			progressText.textContent = 'Initializing generation...';

			try {
				const filePath = await window.OllamaAPI.generateImage({
					...job,
					onProgress: (status) => {
						progressText.textContent = status || 'Generating...';
					}
				});

				if (filePath) {
					// Load the saved file for display via the file:// protocol
					outputImg.src = `file://${filePath}`;
					savedPathSpan.textContent = filePath;
					resultDiv.classList.remove('d-none');
				} else {
					alert('Generation completed but no image file was found.');
				}
			} catch (error) {
				console.error('Image generation failed:', error);
				alert(`Failed to generate image: ${error.message}`);
			} finally {
				progressDiv.classList.add('d-none');
				isGenerating = false;
				updateButtons();
				updateIterationStatus();
				// Process next in queue
				if (queue.length > 0) processQueue();
			}
		}

		async function addToQueue(previewMode = false) {
			if (!currentModel || !promptInput.value.trim() || !isMac) return;

			let finalPrompt = promptInput.value.trim();

			// Prompt assist: ask a chat model to enhance the prompt
			if (promptAssist.checked && !previewMode) {
				try {
					progressDiv.classList.remove('d-none');
					progressText.textContent = 'Enhancing prompt...';
					const improved = await window.OllamaAPI.chat({
						model: currentModel,
						messages: [{
							role: 'user',
							content: `Rewrite the following image generation prompt to be more vivid and detailed. Return ONLY the improved prompt, no explanation:\n\n${finalPrompt}`
						}]
					});
					if (improved && improved.trim()) finalPrompt = improved.trim();
					progressDiv.classList.add('d-none');
				} catch (e) {
					progressDiv.classList.add('d-none');
				}
			}

			const job = buildJob();
			job.prompt = buildPrompt(finalPrompt);

			if (previewMode) {
				// Generate a small preview (max 256px on the long side)
				const ratio = job.width / job.height;
				if (ratio >= 1) { job.width = 256; job.height = Math.round(256 / ratio); }
				else { job.height = 256; job.width = Math.round(256 * ratio); }
				job.steps = Math.min(job.steps, 10);
			}

			queue.push(job);
			updateIterationStatus();
			processQueue();
		}

		function clearIteration() {
			queue = [];
			iterationCount = 0;
			resultDiv.classList.add('d-none');
			outputImg.src = '';
			savedPathSpan.textContent = '';
			updateIterationStatus();
		}

		async function copyImage() {
			try {
				const response = await fetch(outputImg.src);
				const blob = await response.blob();
				await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
				const orig = copyBtn.innerHTML;
				copyBtn.innerHTML = '<i class="bi bi-check"></i> Copied!';
				setTimeout(() => { copyBtn.innerHTML = orig; }, 2000);
			} catch (error) {
				console.error('Copy failed:', error);
				alert('Failed to copy image to clipboard');
			}
		}

		// Preset → update width/height
		presetSelect.addEventListener('change', () => {
			const sizes = PRESET_SIZES[presetSelect.value];
			if (sizes) {
				widthInput.value = sizes[0];
				heightInput.value = sizes[1];
			}
		});

		addQueueBtn.addEventListener('click', () => addToQueue(false));
		previewBtn.addEventListener('click', () => addToQueue(true));
		clearIterBtn.addEventListener('click', clearIteration);

		copyBtn.addEventListener('click', copyImage);
		promptInput.addEventListener('input', updateButtons);
		promptInput.addEventListener('keydown', (e) => {
			if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addToQueue(false);
		});

		document.querySelectorAll('.quick-prompt').forEach(btn => {
			btn.addEventListener('click', () => {
				promptInput.value = btn.dataset.prompt;
				updateButtons();
			});
		});

		if (isMac) init();
	})();
</script>
